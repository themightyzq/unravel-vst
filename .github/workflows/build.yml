name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
            artifact: Unravel-macOS
          - os: windows-latest
            name: Windows
            artifact: Unravel-Windows
          - os: ubuntu-latest
            name: Linux
            artifact: Unravel-Linux

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libjack-jackd2-dev \
            ladspa-sdk \
            libfreetype-dev \
            libfreetype6-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libglu1-mesa-dev \
            mesa-common-dev \
            libgtk-3-dev \
            pkg-config

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Verify Universal Binary (macOS)
        if: runner.os == 'macOS'
        run: |
          set -e
          # Standalone path is overridden via RUNTIME_OUTPUT_DIRECTORY in
          # CMakeLists.txt — it lands under build/bin/, NOT under
          # build/Unravel_artefacts/Release/Standalone where JUCE would
          # otherwise place it.
          for bundle in \
              build/Unravel_artefacts/Release/VST3/Unravel.vst3/Contents/MacOS/Unravel \
              build/Unravel_artefacts/Release/AU/Unravel.component/Contents/MacOS/Unravel \
              build/bin/Standalone/Unravel.app/Contents/MacOS/Unravel; do
            archs=$(lipo -archs "$bundle")
            echo "$bundle: $archs"
            echo "$archs" | grep -qE "(x86_64.*arm64|arm64.*x86_64)" \
              || { echo "ERROR: $bundle is not Universal (arm64 + x86_64)"; exit 1; }
          done

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: |
          # Ad-hoc signing — no Apple Developer ID, no notarization. Users
          # still need to clear quarantine on first install
          # (`xattr -dr com.apple.quarantine <bundle>`). Ad-hoc signing
          # reduces "damaged" false-positives on macOS 14+ and is required
          # for arm64 JIT mmap paths some JUCE modules can hit.
          #
          # --deep is deprecated by Apple; VST3 / AU / Standalone bundles
          # here have no nested helpers so signing the top bundle is enough.
          # --timestamp=none skips the timestamp server (not available /
          # not meaningful for ad-hoc signs).
          for bundle in \
              build/Unravel_artefacts/Release/VST3/Unravel.vst3 \
              build/Unravel_artefacts/Release/AU/Unravel.component \
              build/bin/Standalone/Unravel.app; do
            codesign --force --sign - --timestamp=none "$bundle"
            codesign --verify --verbose "$bundle"
          done

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          # Use ditto rather than cp -r so xattrs (including the just-applied
          # ad-hoc signature) survive the zip step that upload-artifact does.
          mkdir -p release
          ditto build/Unravel_artefacts/Release/VST3/Unravel.vst3 release/Unravel.vst3
          ditto build/Unravel_artefacts/Release/AU/Unravel.component release/Unravel.component

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p release
          cp -r build/Unravel_artefacts/Release/VST3/Unravel.vst3 release/

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p release
          cp -r build/Unravel_artefacts/Release/VST3/Unravel.vst3 release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release archives
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            zip -r "../${name}.zip" "$dir"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: "*.zip"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
